version: '2'

services:
  web:
    build: web
    ports:
     - "80:80"
    volumes:
     - ../:/opt/hamstersbooks
    environment:
      - APP_BASE_URL=http://127.0.0.1/
      - DB_ENV_CONFIGURED=1
      - DB_HOST=mysql
      - DB_USER=hamstersbooks
      - DB_PASS=hamstersbooks
      - DB_DATABASE=hamstersbooks
    links:
     - mysql
  mysql:
    image: mariadb:10.6.15
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
     - MARIADB_ROOT_PASSWORD=root
     - MARIADB_DATABASE=hamstersbooks
     - MARIADB_USER=hamstersbooks
     - MARIADB_PASSWORD=hamstersbooks
    ports:
     - "3306:3306"




volumes:
  mysql-data:
