name: "🐹 Hamsters Books CI/CD Pipeline"
on: 
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5 
      - name: Package Application
        run: |
          make release
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "application"
          path: "./build.tar"
          if-no-files-found: 'error'
          retention-days: 3
          
  deploy: 
    runs-on: ubuntu-latest
    needs: build
    environment: prod
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: "application"
      - name: check existence
        run: |
          ls -la

  